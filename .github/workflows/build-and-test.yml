name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test-api DOCKER_NETWORK="--network host"

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test-web

  build-web:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build-web VITE_COSTIFY_API_URL=${{ vars.VITE_COSTIFY_API_URL }}

  generate-er-diagram:
    name: Generate ER Diagram
    runs-on: ubuntu-latest
    needs: test-api
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: costify_db
          POSTGRES_USER: costify_user
          POSTGRES_PASSWORD: costify_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run Flyway migrations
        working-directory: api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/costify_db
          SPRING_DATASOURCE_USERNAME: costify_user
          SPRING_DATASOURCE_PASSWORD: costify_pass
        run: |
          ./mvnw flyway:migrate \
            -Dflyway.url=$SPRING_DATASOURCE_URL \
            -Dflyway.user=$SPRING_DATASOURCE_USERNAME \
            -Dflyway.password=$SPRING_DATASOURCE_PASSWORD

      - name: Generate ER diagram
        uses: ViniciusDev26/er-diagram@v5
        with:
          db-name: costify_db
          db-user: costify_user
          db-pass: costify_pass
          db-host: localhost
          db-port: "5432"
          output-dir: docs
          write-to-readme: "true"
          readme-path: api/README.md
          excluded-tables: none
          auto-commit: "true"
          commit-message: "📊 update database ER diagram and documentation [skip ci]"