services:
  postgres:
    image: postgres:16.9-alpine
    container_name: costify-postgres
    environment:
      POSTGRES_DB: costify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - costify-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: costify-api
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: costify
      DB_USER: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      CONTEXT_PATH: /api
      DB_POOL_SIZE: 20
      DB_POOL_MIN_IDLE: 5
    ports:
      - "8080:8080"
    networks:
      - costify-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: development
    container_name: costify-web
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
    ports:
      - "5173:5173"
    environment:
      VITE_COSTIFY_API_URL: ${VITE_COSTIFY_API_URL:-http://localhost:8080/api}
    networks:
      - costify-network
    depends_on:
      api:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./web/src
          target: /app/src
        - action: sync
          path: ./web/index.html
          target: /app/index.html
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/bun.lock

volumes:
  postgres_data:
    driver: local

networks:
  costify-network:
    driver: bridge