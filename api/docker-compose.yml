services:
  postgres:
    image: postgres:16.9-alpine
    container_name: costify-postgres
    environment:
      POSTGRES_DB: costify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - costify-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: costify-app
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: prod

      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: costify
      DB_USER: postgres
      DB_PASSWORD: postgres

      # Application Configuration
      SERVER_PORT: 8080
      CONTEXT_PATH: /api

      # Connection Pool
      DB_POOL_SIZE: 20
      DB_POOL_MIN_IDLE: 5
    ports:
      - "8080:8080"
    networks:
      - costify-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  costify-network:
    driver: bridge